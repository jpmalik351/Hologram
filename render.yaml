databases:
  - name: hologram-db
    plan: free
    region: oregon

services:
  - type: web
    name: hologram-chatbot
    runtime: python
    plan: free
    region: oregon
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand:"cd backend && gunicorn app:app --bind 0.0.0.0:$PORT 
--workers 1 --threads 2 --worker-class gthread --timeout 120 
--max-requests 1000 --max-requests-jitter 50"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: STT_MODEL
        value: whisper-1
      - key: TTS_MODEL
        value: tts-1
      - key: TTS_VOICE
        value: onyx
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: hologram-conversations
      - key: PINECONE_REGION
        value: us-east-1
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: AUTH_CREDENTIALS
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hologram-db
          property: connectionString
